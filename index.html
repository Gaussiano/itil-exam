<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ITIL Foundation — App de Examen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      background: #efece4;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .stage { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .annotation {
      max-width: 280px;
      font-size: 13px;
      color: #6b6b6b;
      line-height: 1.55;
    }
    .annotation h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin: 0 0 8px; font-weight: 700; }
    .annotation strong { color: #1a1a1a; font-weight: 600; }
    /* Reset some Android-frame quirks for our content */
    .app-root { font-family: 'Manrope', system-ui, sans-serif; color: #1a1a1a; }

    /* Mobile: full-screen app, no frame or annotations */
    @media (max-width: 500px) {
      body { padding: 0; align-items: stretch; }
      #root { display: flex; flex-direction: column; min-height: 100vh; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Question banks -->
  <script src="questions-tema-2-3.js"></script>
  <script src="questions-tema-4.js"></script>
  <script src="questions-tema-5-8.js"></script>
  <script src="questions-tema-9.js"></script>
  <script src="questions-tema-10.js"></script>
  <script src="questions-index.js"></script>

  <!-- Frame + tweaks -->
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Main app -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
